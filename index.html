<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarea Coctelería</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { display: flex; gap: 20px; }
        .column { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; align-items: center; gap: 10px; }
        img { width: 50px; height: 50px; border-radius: 50%; }
        button { background: #2c3e50; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Mi Tarea de Cócteles</h1>
    <div class="container">
        <div class="column">
            <h2>Local (PHP)</h2>
            <button onclick="cargarLocal()">Traer de mi PHP</button>
            <div id="lista-local"></div>
        </div>
        <div class="column">
            <h2>Externo (API)</h2>
            <button onclick="cargarAPI()">Traer de la API</button>
            <div id="lista-api"></div>
        </div>
    </div>

    <script>
        function cargarLocal() {
            fetch('datos.php')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    data.forEach(item => { html += `<div class="card"><strong>${item.nombre}</strong></div>`; });
                    document.getElementById('lista-local').innerHTML = html;
                });
        }

        function cargarAPI() {
            fetch('https://www.thecocktaildb.com/api/json/v1/1/filter.php?c=Ordinary_Drink')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    data.drinks.slice(0, 5).forEach(drink => {
                        html += `<div class="card"><img src="${drink.strDrinkThumb}"><strong>${drink.strDrink}</strong></div>`;
                    });
                    document.getElementById('lista-api').innerHTML = html;
                });
        }
    </script>
</body>
</html>
