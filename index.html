<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarea Coctelería Normalizada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 style="text-align:center; margin-bottom:30px;">🍸 Panel de Control de Cócteles</h1>

    <main class="main-grid">
        <section class="panel">
            <h2>Datos Local (PHP)</h2>
            <button onclick="fetchLocalData()">Listar Tabla Local</button>
            <div id="local-list"></div>
        </section>

        <section class="panel">
            <h2>Datos Global (API)</h2>
            <button onclick="fetchExternalAPI()">Consumir API Externa</button>
            <div id="api-list"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
