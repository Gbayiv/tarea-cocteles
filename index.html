<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea Front-end & Back-end</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🍸 Sistema de Gestión de Cócteles</h1>

        <main class="dashboard">
            <section class="panel">
                <h2>Tabla Local (PHP)</h2>
                <p style="margin-bottom:1rem; font-size:0.9rem; color:var(--text-secondary)">
                    Datos procesados por el servidor local.
                </p>
                <button onclick="listarLocal()">Ejecutar Script PHP</button>
                <div id="lista-local"></div>
            </section>

            <section class="panel">
                <h2>API Externa (Global)</h2>
                <p style="margin-bottom:1rem; font-size:0.9rem; color:var(--text-secondary)">
                    Recursos consumidos desde TheCocktailDB.
                </p>
                <button onclick="listarAPI()">Consumir Endpoint API</button>
                <div id="lista-api"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
